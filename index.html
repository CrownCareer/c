<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>গোপন চ্যাট রুম</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #e5ddd5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* লগইন স্ক্রিন */
        #login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #075e54; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background: #128c7e; }
        
        /* চ্যাট স্ক্রিন */
        #chat-box { display: none; width: 100%; max-width: 600px; height: 90vh; background: #efeae2; flex-direction: column; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        #chat-header { background: #075e54; color: white; padding: 15px; font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        #search-container { padding: 10px; background: #fff; display: flex; gap: 5px; border-bottom: 1px solid #ddd; }
        #search-input { margin: 0; padding: 8px; }
        #search-btn { width: auto; padding: 8px 15px; margin: 0; font-size: 14px; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* মেসেজের বাবল */
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 8px; font-size: 15px; line-height: 1.4; position: relative; word-wrap: break-word; }
        .msg.sent { background: #d9fdd3; align-self: flex-end; border-top-right-radius: 0; }
        .msg.received { background: white; align-self: flex-start; border-top-left-radius: 0; }
        .msg .sender { font-size: 11px; color: #128c7e; font-weight: bold; display: block; margin-bottom: 4px; }
        
        #input-area { background: #f0f2f5; padding: 10px; display: flex; gap: 10px; align-items: center; }
        #msg-input { flex: 1; margin: 0; border-radius: 20px; padding: 12px 20px; }
        #send-btn { width: auto; border-radius: 50%; width: 45px; height: 45px; padding: 0; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<!-- প্রবেশ এরিয়া -->
<div id="login-box">
    <h2>অনলাইন আড্ডা</h2>
    <p style="color: #666; font-size: 13px; margin-bottom: 10px;">আপনার নাম এবং রুম কোড দিয়ে প্রবেশ করুন</p>
    <input type="text" id="username" placeholder="আপনার সুন্দর একটি নাম দিন">
    <input type="text" id="roomkey" placeholder="সিক্রেট রুম কি (Room Key)">
    <button onclick="enterChat()">রুমে প্রবেশ করুন</button>
</div>

<!-- চ্যাট রুম এরিয়া -->
<div id="chat-box">
    <div id="chat-header">
        <span id="room-title">অনলাইন আড্ডা</span>
        <button onclick="location.reload()" style="width:auto; background:transparent; font-size:12px; padding:5px;">বেরিয়ে যান</button>
    </div>
    
    <!-- ইউজার খোঁজার অপশন -->
    <div id="search-container">
        <input type="text" id="search-input" placeholder="বন্ধুর নাম লিখে মেসেজ খুঁজুন...">
        <button id="search-btn" onclick="searchUserMessages()">খুঁজুন</button>
    </div>
    
    <div id="messages"></div>
    
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="মেসেজ লিখুন..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button id="send-btn" onclick="sendMsg()">➔</button>
    </div>
</div>

<!-- Firebase লাইব্রেরি যুক্ত করা -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    //---------------------------------------------------------
    // এখানে "chat123" কেটে আপনার বন্ধুদের জন্য একটি গোপন রুম কোড দিন
    //---------------------------------------------------------
    const SECRET_ROOM_KEY = "chat123"; 

    // Firebase কনফিগারেশন
    const firebaseConfig = {
        databaseURL: "https://public-chat-bdfc3-default-rtdb.firebaseio.com/"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    let currentUser = "";

    // চ্যাট রুমে প্রবেশের ফাংশন (সাইন-আপ ছাড়াই)
    function enterChat() {
        const userInp = document.getElementById('username').value.trim();
        const keyInp = document.getElementById('roomkey').value.trim();

        if(userInp === "" || keyInp === "") {
            alert("দয়া করে আপনার নাম এবং রুম কি দুটিই দিন।");
            return;
        }

        // রুম কি মিলে গেলেই যে কোনো নাম নিয়ে ভেতরে ঢুকতে দেবে
        if(keyInp === SECRET_ROOM_KEY) {
            currentUser = userInp;
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('chat-box').style.display = 'flex';
            loadMessages(); 
        } else {
            alert("দুঃখিত! রুম কি (Room Key) সঠিক নয়। আপনার বন্ধুর থেকে সঠিক কি-টি জেনে নিন।");
        }
    }

    // মেসেজ পাঠানো
    function sendMsg() {
        const msgInp = document.getElementById('msg-input');
        const text = msgInp.value.trim();
        
        if(text !== "") {
            database.ref("global_messages").push({
                sender: currentUser,
                message: text,
                timestamp: Date.now()
            });
            msgInp.value = "";
        }
    }

    // ডাটাবেজ থেকে লাইভ মেসেজ পড়া
    function loadMessages() {
        const msgArea = document.getElementById('messages');
        database.ref("global_messages").on("value", (snapshot) => {
            msgArea.innerHTML = "";
            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                displayMessage(data.sender, data.message);
            });
            msgArea.scrollTop = msgArea.scrollHeight;
        });
    }

    // স্ক্রিনে মেসেজ দেখানো
    function displayMessage(sender, text) {
        const msgArea = document.getElementById('messages');
        const div = document.createElement('div');
        const isMe = sender === currentUser;
        
        div.className = `msg ${isMe ? 'sent' : 'received'}`;
        div.innerHTML = `<span class="sender">${sender}</span>${text}`;
        msgArea.appendChild(div);
    }

    // ইউজারনেম দিয়ে মেসেজ খোঁজার ফাংশন
    function searchUserMessages() {
        const searchName = document.getElementById('search-input').value.trim().toLowerCase();
        const allMessages = document.querySelectorAll('.msg');
        
        if(searchName === "") {
            allMessages.forEach(msg => msg.style.opacity = "1");
            return;
        }

        allMessages.forEach(msg => {
            const senderName = msg.querySelector('.sender').innerText.toLowerCase();
            if(senderName.includes(searchName)) {
                msg.style.opacity = "1";
                msg.style.border = "2px solid #075e54"; 
            } else {
                msg.style.opacity = "0.3"; 
                msg.style.border = "none";
            }
        });
    }
</script>
</body>
</html>
